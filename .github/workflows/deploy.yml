name: Build and Deploy
on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
    workflow_dispatch:
permissions:
  contents: read
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # actions/checkout@v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # actions/setup-node@v6.4.0
        with:
          node-version-file: .nvmrc
      - run: npm clean-install
      - run: npm audit signatures
      - run: npx playwright install --with-deps chromium
      - run: npm run lint-yaml
      - name: Check code formatting
        run: npm run --silent prettier-list | awk '{ print "::warning file=" $0 ",title=Code style::" $0 " is not correctly formatted. Call npm run prettier-fix." }'
      - run: npm run lint-js
      - run: npm run test-unit
      - run: npm run build-blog
      - run: npm run build-txt
      - run: npm run build
      - run: npm run validate-data
      - run: npm run test-calls
      - run: npm run test-fe
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # actions/setup-python@v6.2.0
        with:
          python-version: 3.11.9
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # actions/cache@v5.0.5
        with:
          path: ~/.local/share/virtualenvs
          key: ${{ runner.os }}-pipenv-${{ hashFiles('**/Pipfile.lock') }}
          restore-keys: ${{ runner.os }}-pipenv-
      - run: pip install pipenv
      - run: pipenv install
      - run: pipenv run mkdocs build
      - run: npm run build-jsdoc
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # actions/upload-artifact@v7.0.1
        with:
          name: public-directory
          path: dist/public/
  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.repository == 'trovu/trovu' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # actions/checkout@v6.0.3
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # actions/download-artifact@v8.0.1
        with:
          name: public-directory
          path: dist/public
      - uses: JamesIves/github-pages-deploy-action@d92aa235d04922e8f08b40ce78cc5442fcfbfa2f # JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist/public/
          repository-name: trovu/trovu-deploy
          branch: master
          ssh-key: ${{ secrets.DEPLOY_KEY }}
          target-folder: ${{ (github.ref == 'refs/heads/master' && 'master') || 'dev' }}
          clean: true
