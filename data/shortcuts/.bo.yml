# yaml-language-server: $schema=https://trovu.net/schema/shortcuts.yml
abi 0:
  url: https://www.abi.bo/
  title: Agencia Boliviana de Informacion busqueda
  tags:
  - news
  examples:
  - description: Ir a la pagina principal
abi 1:
  url: https://www.abi.bo/index.php/component/search/?searchword=<termino>&searchphrase=all&Itemid=101
  include: abi 0
  examples:
  - arguments: covid
    description: Buscar "covid"
jw 1:
  url: https://www.justwatch.com/bo/buscar?q=<query>
  include:
    key: jw 0
    namespace: o
  examples:
  - arguments: simpsons
    description: Search for "simpsons"
lr 0:
  url: https://larazon.bo/
  title: La Razón (Bolivia)
  tags:
  - news
  - newspaper
  - spanish
  examples:
  - description: Ir a la página principal
  description: Uno de los principales periódicos nacionales de Bolivia, con una amplia cobertura sobre política, economía y sociedad del país.
lr 1:
  url: https://larazon.bo/?s=<query>
  include: lr 0
  examples:
  - arguments: Tarija
    description: Buscar noticias sobre el departamento de Tarija en La Razón
meli 0:
  url: https://www.mercadolibre.com.bo/
  title: Mercado Libre Bolivia
  tags:
  - anuncios
  - clasificados
  - compras
  - ecommerce
  - mercadolibre
  - productos
  - shopping
  - ventas
  examples:
  - description: Ir a la página principal
meli 1:
  url: https://listado.mercadolibre.com.bo/<busqueda>
  include: meli 0
  examples:
  - arguments: celular
    description: Buscar "celular" en Mercado Libre Bolivia
